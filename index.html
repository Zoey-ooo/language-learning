<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F9FAFB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="日語短語" />
  <title>日本旅遊短語</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React + Babel via CDN (no build needed) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F4F0;
      --surface: #F9FAFB;
      --card: #ffffff;
      --border: #f1f5f9;
      --border2: #e2e8f0;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --accent: #86A789;
      --accent-dark: #5a8f5d;
      --accent-light: #f0f4f0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Noto Sans TC', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    #root { height: 100%; }

    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-enter { animation: slideUp 0.22s ease both; }
    .card-enter:nth-child(1) { animation-delay: 0ms; }
    .card-enter:nth-child(2) { animation-delay: 40ms; }
    .card-enter:nth-child(3) { animation-delay: 80ms; }
    .card-enter:nth-child(4) { animation-delay: 120ms; }
    .card-enter:nth-child(5) { animation-delay: 160ms; }
    .card-enter:nth-child(n+6) { animation-delay: 200ms; }

    .phrase-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 18px 14px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.055);
      user-select: none;
      -webkit-user-select: none;
    }
    .phrase-card:active {
      transform: scale(0.97);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .btn-play {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
      background: var(--accent-light);
      color: var(--text-primary);
    }
    .btn-play.playing { background: var(--accent); color: #fff; }
    .btn-play:active { transform: scale(0.88); }

    .btn-zoom {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: #f8fafc;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .btn-zoom:active { transform: scale(0.88); }

    .nav-btn {
      flex: 1;
      padding: 10px 4px 12px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: transform 0.12s;
      position: relative;
    }
    .nav-btn:active { transform: scale(0.88); }

    .modal-backdrop {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      animation: fadeIn 0.18s ease;
    }
    .modal-card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.22);
      text-align: center;
      animation: scaleIn 0.22s cubic-bezier(0.34,1.4,0.64,1);
    }

    .search-box {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 12px;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box input {
      flex: 1; border: none; background: transparent;
      font-size: 15px; color: var(--text-primary);
      font-family: inherit;
      outline: none;
    }
    .search-box input::placeholder { color: var(--text-muted); }

    .btn-modal-play {
      margin-top: 28px;
      padding: 13px 32px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex; align-items: center; gap: 8px;

      box-shadow: 0 4px 16px rgba(134,167,137,0.4);
    }
    .btn-modal-play:active { transform: scale(0.95); }
    .btn-modal-play:hover { background: var(--accent-dark); }

    .btn-close {

      color: var(--text-muted); cursor: pointer;
      font-size: 13px; font-family: inherit;
      margin-top: 16px;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.15s;
    }

      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
  </style>
</head>

// ── TTS ───────────────────────────────────────────────────────────────────────
function playJapanese(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ja-JP";
  utter.rate = 0.9;
  utter.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith("ja"));
  if (jaVoice) utter.voice = jaVoice;
  window.speechSynthesis.speak(utter);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function FlashcardModal({ phrase, onClose }) {
  useEffect(() => {
    const fn = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", fn);
    return () => document.removeEventListener("keydown", fn);
  }, [onClose]);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" onClick={e => e.stopPropagation()}>
        <p style={{ fontSize:11, letterSpacing:"0.12em", textTransform:"uppercase", color:"var(--accent)", fontWeight:600, marginBottom:20 }}>
          ↓ 請出示給工作人員 ↓
        </p>
        <p style={{ fontSize:"clamp(26px,8vw,46px)", fontWeight:700, color:"var(--text-primary)", lineHeight:1.45, marginBottom:20, letterSpacing:"0.02em" }}>
          {phrase.jp}
        </p>
        <div style={{ width:40, height:2, background:"var(--border2)", margin:"0 auto 16px" }} />
        <p style={{ fontSize:13, color:"var(--text-muted)", marginBottom:5 }}>{phrase.romaji}</p>
        <p style={{ fontSize:16, color:"var(--text-secondary)", fontWeight:500, marginBottom:5 }}>{phrase.zh}</p>
        <p style={{ fontSize:13, color:"var(--text-muted)" }}>{phrase.en}</p>
        <div>
          <button className="btn-modal-play" onClick={() => playJapanese(phrase.jp)}>
            <span>▶</span> 播放語音
          </button>
        </div>
        <div>
          <button className="btn-close" onClick={onClose}>關閉 ✕</button>
        </div>
      </div>
    </div>
  );
}

// ── Card ──────────────────────────────────────────────────────────────────────
function PhraseCard({ phrase, onOpen }) {
  const [playing, setPlaying] = useState(false);

  const handlePlay = e => {
    e.stopPropagation();
    setPlaying(true);
    playJapanese(phrase.jp);
    setTimeout(() => setPlaying(false), 2200);
  };

  return (
    <div className="phrase-card card-enter" onClick={() => onOpen(phrase)}>
      <p style={{ fontSize:20, fontWeight:700, color:"var(--text-primary)", marginBottom:5, lineHeight:1.4 }}>
        {phrase.jp}
      </p>
      <p style={{ fontSize:11, color:"var(--text-muted)", marginBottom:10, letterSpacing:"0.04em" }}>
        {phrase.romaji}
      </p>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:8 }}>
        <div style={{ minWidth:0 }}>
          <p style={{ fontSize:14, fontWeight:600, color:"var(--text-secondary)", marginBottom:2 }}>{phrase.zh}</p>
          <p style={{ fontSize:12, color:"var(--text-muted)" }}>{phrase.en}</p>
        </div>
        <div style={{ display:"flex", gap:8, flexShrink:0 }}>
          <button className={`btn-play${playing ? " playing" : ""}`} onClick={handlePlay} title="播放語音">
            {playing ? "🔊" : "▶"}
          </button>
          <button className="btn-zoom" onClick={e => { e.stopPropagation(); onOpen(phrase); }} title="全螢幕顯示">
            ⛶
          </button>
        </div>
      </div>
    </div>
  );
}

          <div style={{
            position:"sticky", top:0, zIndex:10,
            background:"rgba(249,250,251,0.95)",
            backdropFilter:"blur(12px)",
            WebkitBackdropFilter:"blur(12px)",
            borderBottom:"1px solid var(--border)",
            paddingTop:"env(safe-area-inset-top, 12px)",
          }}>
            <div style={{ padding:"16px 20px 10px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:22 }}>{activeCat?.icon}</span>
                  <h1 style={{ fontSize:20, fontWeight:700, color:"var(--text-primary)", letterSpacing:"-0.02em" }}>
                    {activeCat?.label}
                  </h1>
                </div>
                <p style={{ fontSize:11, color:"var(--text-muted)", marginTop:2, letterSpacing:"0.06em" }}>
                  JAPAN TRAVEL PHRASES · {filtered.length} 條
                </p>
              </div>
              <div style={{
                width:38, height:38, borderRadius:"50%",
                background:"linear-gradient(135deg, #86A789 0%, #5a8f5d 100%)",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:20, boxShadow:"0 4px 12px rgba(134,167,137,0.35)",
              }}>🇯🇵</div>
            </div>

            {/* Search */}
            <div style={{ padding:"0 20px 14px" }}>
              <div className="search-box">
                <span style={{ color:"var(--text-muted)", fontSize:16 }}>🔍</span>
                <input
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                  placeholder="搜尋短語..."
                />
                {query && (
                  <button
                    onClick={() => setQuery("")}
                    style={{ background:"none", border:"none", color:"var(--text-muted)", cursor:"pointer", fontSize:16, lineHeight:1 }}
                  >✕</button>
                )}
              </div>
            </div>
          </div>

          {/* ── List ── */}
          <div
            key={listKey}
            style={{
              flex:1,
              overflowY:"auto",
              padding:"12px 16px",
              display:"flex", flexDirection:"column", gap:10,
              paddingBottom:"calc(76px + env(safe-area-inset-bottom, 12px))",
            }}
          >
            {filtered.length === 0 ? (
              <div className="empty-state">
                <p style={{ fontSize:40, marginBottom:12 }}>🔍</p>
                <p style={{ fontSize:15 }}>找不到相關短語</p>
              </div>
            ) : filtered.map(phrase => (
              <PhraseCard key={phrase.id} phrase={phrase} onOpen={setModalPhrase} />
            ))}
          </div>

          {/* ── Bottom Nav ── */}
          <div style={{
            position:"fixed",
            bottom:0,
            left:"50%",
            transform:"translateX(-50%)",
            width:"100%",
            maxWidth:480,
            background:"rgba(249,250,251,0.96)",
            backdropFilter:"blur(16px)",
            WebkitBackdropFilter:"blur(16px)",
            borderTop:"1px solid var(--border2)",
            display:"flex",
            paddingBottom:"env(safe-area-inset-bottom, 0px)",
            zIndex:20,
          }}>
            {CATEGORIES.map(cat => {
              const isActive = cat.id === activeCategory;
              return (
                <button key={cat.id} className="nav-btn" onClick={() => handleCategoryChange(cat.id)}>
                  <span style={{ fontSize:22, lineHeight:1 }}>{cat.icon}</span>
                  <span style={{
                    fontSize:10,
                    fontWeight: isActive ? 700 : 400,
                    color: isActive ? "var(--accent)" : "var(--text-muted)",
                    transition:"color 0.15s",
                  }}>{cat.label}</span>
                  {isActive && (
                    <div style={{
                      width:4, height:4, borderRadius:"50%",
                      background:"var(--accent)",
                      position:"absolute",
                      bottom:"env(safe-area-inset-bottom, 4px)",
                    }} />
                  )}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Modal */}
      {modalPhrase && <FlashcardModal phrase={modalPhrase} onClose={() => setModalPhrase(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
