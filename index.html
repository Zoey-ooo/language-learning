<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#eef4ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅遊日語">
<title>旅遊日語 フレーズ帳</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@300;400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef4ee;--bg2:#e4ede4;--bg3:#d5e8d5;
  --hd:#1c1c1c;--hd2:#2a2a2a;
  --red:#c0392b;--red-bg:#fdf0ef;
  --ink:#1c1c1c;--ink2:#555;--ink3:#aaa;
  --white:#fff;--line:#e8e6e2;
  --r:12px;
  --fj:'Noto Serif JP',serif;
  --fm:'DM Mono',monospace;
  --ft:'Noto Sans TC',sans-serif;
}
html{background:var(--hd)}
body{font-family:var(--ft);background:var(--bg);color:var(--ink);max-width:430px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:56px}

/* Header */
.hd{background:var(--hd);padding:54px 24px 26px;position:relative;overflow:hidden}
.hd::before{content:'語';position:absolute;right:-10px;top:-14px;font-family:var(--fj);font-size:140px;font-weight:500;color:rgba(255,255,255,.04);line-height:1;pointer-events:none;user-select:none}
.hd-ey{font-family:var(--fm);font-size:9px;letter-spacing:.28em;color:var(--ink3);margin-bottom:10px;text-transform:uppercase}
.hd-ti{font-family:var(--fj);font-size:26px;font-weight:400;color:#fff;letter-spacing:.06em;line-height:1.2}
.hd-su{font-size:11.5px;font-weight:300;color:rgba(255,255,255,.28);margin-top:7px;letter-spacing:.1em}

/* Tabs */
.tw{background:var(--hd2);position:sticky;top:0;z-index:30;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.ts{display:flex;overflow-x:auto;scrollbar-width:none;gap:2px;padding:9px 0}
.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:6px 16px;border-radius:100px;border:none;background:transparent;cursor:pointer;font-family:var(--ft);font-size:13px;color:rgba(255,255,255,.32);letter-spacing:.04em;transition:background .16s,color .16s;-webkit-tap-highlight-color:transparent}
.tb.on{background:rgba(255,255,255,.1);color:rgba(255,255,255,.92)}

/* List */
.li{padding:14px 14px 0;display:flex;flex-direction:column;gap:1px}
.sh{display:flex;align-items:center;gap:12px;padding:16px 2px 8px}
.sl{flex:1;height:1px;background:var(--bg3)}
.sk{font-family:var(--fm);font-size:9px;letter-spacing:.2em;color:var(--ink3);text-transform:uppercase;flex-shrink:0}

/* Card */
.pc{background:#fff;overflow:hidden}
.pc:first-of-type{border-radius:var(--r) var(--r) 0 0}
.pc:last-of-type{border-radius:0 0 var(--r) var(--r)}
.pc:only-of-type{border-radius:var(--r)}
.pc+.pc{border-top:1px solid var(--line)}
.pcb{padding:15px 16px 13px}
.pj{font-family:var(--fj);font-size:18px;font-weight:400;color:var(--ink);line-height:1.55;margin-bottom:4px}
.pj.lg{font-size:14.5px}
.pr{font-family:var(--fm);font-size:10px;font-weight:300;color:var(--ink3);line-height:1.8;margin-bottom:6px}
.pz{font-size:13px;font-weight:300;color:var(--ink2);line-height:1.4}
.pe{font-size:11.5px;font-weight:300;color:var(--ink3);line-height:1.4;margin-top:3px;font-style:italic}

/* Action bar */
.pb{border-top:1px solid var(--line);display:flex}
.ps{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 0;background:none;border:none;border-right:1px solid var(--line);cursor:pointer;font-family:var(--ft);font-size:12px;color:var(--ink2);letter-spacing:.04em;transition:background .12s,color .12s;-webkit-tap-highlight-color:transparent;min-height:44px}
.ps:active,.ps.on{color:var(--red);background:var(--red-bg)}
.ps svg{width:13px;height:13px;flex-shrink:0}
.sd{width:5px;height:5px;border-radius:50%;background:var(--red);display:none;flex-shrink:0}
.ps.on .sd{display:block;animation:dp .8s infinite}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.6)}}
.px{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;background:none;border:none;cursor:pointer;font-family:var(--ft);font-size:12px;color:var(--ink3);letter-spacing:.04em;transition:background .12s;-webkit-tap-highlight-color:transparent;min-height:44px}
.px:active{background:var(--bg2)}
.px svg{width:12px;height:12px;flex-shrink:0}

/* Flashcard */
.ov{display:none;position:fixed;inset:0;z-index:100;background:rgba(10,10,10,.85);align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.ov.open{display:flex}
.fc{background:var(--hd);width:100%;max-width:430px;border-radius:24px 24px 0 0;padding:14px 32px 56px;min-height:66vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;animation:fci .24s cubic-bezier(.32,1.08,.58,1)}
@keyframes fci{from{transform:translateY(48px);opacity:0}to{transform:translateY(0);opacity:1}}
.fh{width:32px;height:3px;border-radius:2px;background:rgba(255,255,255,.12);margin:0 auto 40px;align-self:center}
.fx{position:absolute;top:18px;right:20px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.07);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,.35);-webkit-tap-highlight-color:transparent}
.fcat{font-family:var(--fm);font-size:9px;letter-spacing:.24em;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:24px;text-align:center}
.fjp{font-family:var(--fj);font-size:44px;font-weight:300;color:#fff;line-height:1.5;text-align:center;width:100%}
.fjp.fl{font-size:30px}
.fb{width:20px;height:1px;background:rgba(255,255,255,.2);margin:22px auto 20px}
.fro{font-family:var(--fm);font-size:11px;font-weight:300;color:rgba(255,255,255,.25);line-height:2;text-align:center;margin-bottom:12px}
.fzh{font-size:17px;font-weight:300;color:rgba(255,255,255,.55);text-align:center;line-height:1.5}

/* Install bar */
.ib{background:#2a2a2a;display:none;align-items:center;gap:10px;padding:10px 16px}
.ib span{flex:1;font-size:12px;color:rgba(255,255,255,.65);line-height:1.4}
.ib-b{padding:6px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.2);background:none;color:rgba(255,255,255,.75);font-size:11.5px;cursor:pointer}
.ib-x{background:none;border:none;font-size:16px;color:rgba(255,255,255,.25);cursor:pointer;padding:2px 4px;line-height:1}
</style>

let cur='全部', activeBtn=null;

// ═══════════════════════════════════════════
//  發音核心
//
//  iOS Safari 的限制：
//  - Audio / SpeechSynthesis 必須在 user gesture 內啟動
//  - 解法：監聽第一次 touchstart，用一個無聲音檔解鎖 AudioContext
//  - 之後每次點擊直接用 SpeechSynthesis，lang 鎖定 ja-JP
//  - 不依賴任何外部 API，完全離線可用
// ═══════════════════════════════════════════

let audioUnlocked = false;
let activeBtn = null;

// 第一次觸碰頁面時解鎖 Audio（iOS 要求）
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  // 播放一個極短的無聲音檔來解鎖 iOS Audio session
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = ctx.createBuffer(1, 1, 22050);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
  ctx.resume();
}
document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });

function doSpeak(txt, btn) {
  if (!window.speechSynthesis) return;

  if (activeBtn && activeBtn !== btn) activeBtn.classList.remove('on');
  window.speechSynthesis.cancel();
  activeBtn = btn;
  btn.classList.add('on');

  function speak() {
    const u = new SpeechSynthesisUtterance(txt);
    u.lang   = 'ja-JP';
    u.rate   = 0.85;
    u.pitch  = 1.0;
    u.volume = 1.0;

    // 強制選取 ja-JP 語音，排除任何 zh 開頭的語音
    const voices = window.speechSynthesis.getVoices();
    const jaVoice = voices.find(v => v.lang === 'ja-JP' && !v.lang.startsWith('zh'))
                 || voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice) {
      u.voice = jaVoice;
    }

    u.onend = u.onerror = () => {
      btn.classList.remove('on');
      if (activeBtn === btn) activeBtn = null;
    };
    window.speechSynthesis.speak(u);
  }

  // iOS 語音清單有時需要等一下才載入完成
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    speak();
  } else {
    // 等語音清單載入後再播
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null;
      speak();
    };
  }
}

// 預先載入語音清單（iOS 需要這個才能在首次點擊時找到 ja-JP）
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ═══════════════════════════════════════════
function openFC(id) {
  const p = DATA.find(x => x.id === id);
  if (!p) return;
  document.getElementById('fc-cat').textContent = p.cat;
  const jEl = document.getElementById('fc-jp');
  jEl.textContent = p.jp;
  jEl.className = 'fjp' + (p.jp.length > 14 ? ' fl' : '');
  document.getElementById('fc-ro').innerHTML = p.ro.replace(/\n/g, '<br>');
  document.getElementById('fc-zh').textContent = p.zh;
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFC() {
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow = '';
}
function chkOv(e) {
  if (e.target === document.getElementById('ov')) closeFC();
}

// ═══════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════
function card(p) {
  const lng = p.jp.length > 15;
  return `<div class="pc">
  <div class="pcb">
    <div class="pj${lng?' lg':''}">${p.jp}</div>
    <div class="pr">${p.ro.replace(/\n/g,'<br>')}</div>
    <div class="pz">${p.zh}</div>
    <div class="pe">${p.en}</div>
  </div>
  <div class="pb">
    <button class="ps" data-id="${p.id}" onclick="handleSpeak(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <span class="sd"></span>
      發音
    </button>
    <button class="px" onclick="openFC(${p.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      字卡
    </button>
  </div>
</div>`;
}

// 從 data-id 取得日文文字再呼叫發音
// 避免 HTML attribute 中特殊字元的逸脫問題
function handleSpeak(btn) {
  const id = parseInt(btn.dataset.id);
  const p = DATA.find(x => x.id === id);
  if (p) doSpeak(p.jp, btn);
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = CATS.map(c =>
    `<button class="tb${c===cur?' on':''}" onclick="setTab('${c}')">${c}</button>`
  ).join('');
}

function setTab(c) {
  cur = c;
  AUDIO_EL.pause();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (activeBtn) { activeBtn.classList.remove('on'); activeBtn = null; }
  renderTabs();
  renderList();
}

function renderList() {
  const app = document.getElementById('app');
  if (cur !== '全部') {
    app.innerHTML = `<div class="li">${DATA.filter(p=>p.cat===cur).map(card).join('')}</div>`;
    return;
  }
  app.innerHTML = CATS.filter(c=>c!=='全部').map(cat => `
    <div class="li">
      <div class="sh">
        <span class="sk">${cat} · ${CATJP[cat]}</span>
        <div class="sl"></div>
      </div>
      ${DATA.filter(p=>p.cat===cat).map(card).join('')}
    </div>`).join('');
}

// ═══════════════════════════════════════════
//  PWA
// ═══════════════════════════════════════════
let deferred = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferred = e;
  document.getElementById('ib').style.display = 'flex';
});
document.getElementById('ib-btn').onclick = async () => {
  if (!deferred) return;
  deferred.prompt();
  await deferred.userChoice;
  deferred = null;
  document.getElementById('ib').style.display = 'none';
};
document.getElementById('ib-x').onclick = () => {
  document.getElementById('ib').style.display = 'none';
};
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

renderTabs();
renderList();
</script>
</body>
</html>
