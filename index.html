<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#eef4ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅遊日語">
<title>旅遊日語 フレーズ帳</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@300;400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/*
  日系簡約配色
  頁面底：#f5f3ef  溫暖和紙色
  Header：#1c1c1c  近黑墨色
  卡片：  #ffffff  純白
  朱紅：  #c0392b  一點點點綴，不多用
  文字：  #1c1c1c / #666 / #aaa  三層灰階
  分隔：  #e8e6e2  淡灰
*/

:root {
  --bg:      #eef4ee;
  --bg2:     #e4ede4;
  --bg3:     #d5e8d5;
  --header:  #1c1c1c;
  --header2: #2a2a2a;
  --red:     #c0392b;
  --red-bg:  #fdf0ef;
  --ink:     #1c1c1c;
  --ink2:    #555555;
  --ink3:    #aaaaaa;
  --white:   #ffffff;
  --line:    #e8e6e2;
  --r-md:    12px;
  --r-lg:    18px;
  --font-jp: 'Noto Serif JP', serif;
  --font-mo: 'DM Mono', monospace;
  --font-tc: 'Noto Sans TC', sans-serif;
}

html { background: var(--header); }

body {
  font-family: var(--font-tc);
  background: var(--bg);
  color: var(--ink);
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 56px;
}

/* ── Header ── */
.header {
  background: var(--header);
  padding: 54px 24px 26px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '語';
  position: absolute;
  right: -10px; top: -14px;
  font-family: var(--font-jp);
  font-size: 140px;
  font-weight: 500;
  color: rgba(255,255,255,0.04);
  line-height: 1;
  pointer-events: none;
  user-select: none;
}
.h-eyebrow {
  font-family: var(--font-mo);
  font-size: 9px;
  letter-spacing: 0.28em;
  color: var(--ink3);
  margin-bottom: 10px;
  text-transform: uppercase;
}
.h-title {
  font-family: var(--font-jp);
  font-size: 26px;
  font-weight: 400;
  color: var(--white);
  letter-spacing: 0.06em;
  line-height: 1.2;
}
.h-sub {
  font-size: 11.5px;
  font-weight: 300;
  color: rgba(255,255,255,0.28);
  margin-top: 7px;
  letter-spacing: 0.1em;
}

/* ── Tabs ── */
.tabs-wrap {
  background: var(--header2);
  position: sticky;
  top: 0;
  z-index: 30;
  padding: 0 18px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.tabs {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  gap: 2px;
  padding: 9px 0;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 6px 16px;
  border-radius: 100px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: var(--font-tc);
  font-size: 13px;
  color: rgba(255,255,255,0.32);
  letter-spacing: 0.04em;
  transition: background 0.16s, color 0.16s;
  -webkit-tap-highlight-color: transparent;
}
.tab.active {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.92);
  font-weight: 400;
}

/* ── List wrapper ── */
.list {
  padding: 14px 14px 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.sec-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 2px 8px;
}
.sec-line { flex: 1; height: 1px; background: var(--bg3); }
.sec-label {
  font-family: var(--font-mo);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--ink3);
  text-transform: uppercase;
  flex-shrink: 0;
}

/* ── Phrase Card ── */
.pc {
  background: var(--white);
  overflow: hidden;
}
.pc:first-of-type { border-radius: var(--r-md) var(--r-md) 0 0; }
.pc:last-of-type  { border-radius: 0 0 var(--r-md) var(--r-md); }
.pc:only-of-type  { border-radius: var(--r-md); }
.pc + .pc { border-top: 1px solid var(--line); }

.pc-body {
  padding: 15px 16px 13px;
}

.pc-jp {
  font-family: var(--font-jp);
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.55;
  margin-bottom: 4px;
}
.pc-jp.lg { font-size: 14.5px; }
.pc-jp-sub {
  font-family: var(--font-jp);
  font-size: 12px;
  color: var(--ink3);
  display: block;
  line-height: 1.6;
}

.pc-ro {
  font-family: var(--font-mo);
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  line-height: 1.8;
  margin-bottom: 6px;
  letter-spacing: 0.01em;
}

.pc-zh {
  font-size: 13px;
  font-weight: 300;
  color: var(--ink2);
  line-height: 1.4;
}

.pc-en {
  font-size: 11.5px;
  font-weight: 300;
  color: var(--ink3);
  line-height: 1.4;
  margin-top: 3px;
  font-style: italic;
}

/* action bar */
.pc-bar {
  border-top: 1px solid var(--line);
  display: flex;
}

.pc-speak {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 0;
  background: none;
  border: none;
  border-right: 1px solid var(--line);
  cursor: pointer;
  font-family: var(--font-tc);
  font-size: 12px;
  color: var(--ink2);
  letter-spacing: 0.04em;
  transition: background 0.12s, color 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.pc-speak:active { background: var(--bg); }
.pc-speak.on { color: var(--red); background: var(--red-bg); }
.pc-speak svg { width: 13px; height: 13px; flex-shrink: 0; }
.sp-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--red);
  display: none; flex-shrink: 0;
}
.pc-speak.on .sp-dot { display: block; animation: dot-pulse 0.8s infinite; }
@keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(1.6)} }

.pc-card {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font-tc);
  font-size: 12px;
  color: var(--ink3);
  letter-spacing: 0.04em;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.pc-card:active { background: var(--bg); }
.pc-card svg { width: 12px; height: 12px; flex-shrink: 0; }

/* ── Flashcard ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(10,10,10,0.82);
  align-items: flex-end;
  justify-content: center;
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
}
.overlay.open { display: flex; }

.fc {
  background: var(--header);
  width: 100%;
  max-width: 430px;
  border-radius: 24px 24px 0 0;
  padding: 14px 32px 56px;
  min-height: 66vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: fc-in 0.24s cubic-bezier(0.32,1.08,0.58,1);
}
@keyframes fc-in {
  from { transform: translateY(48px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.fc-handle {
  width: 32px; height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.12);
  margin: 0 auto 40px;
  align-self: center;
}

.fc-close {
  position: absolute;
  top: 18px; right: 20px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: rgba(255,255,255,0.35);
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.fc-close:active { background: rgba(255,255,255,0.14); }

.fc-cat {
  font-family: var(--font-mo);
  font-size: 9px;
  letter-spacing: 0.26em;
  color: rgba(255,255,255,0.28);
  text-transform: uppercase;
  margin-bottom: 24px;
  text-align: center;
}

.fc-jp {
  font-family: var(--font-jp);
  font-size: 46px;
  font-weight: 300;
  color: var(--white);
  line-height: 1.5;
  text-align: center;
  width: 100%;
}
.fc-jp.fc-long { font-size: 30px; }

.fc-bar {
  width: 20px; height: 1px;
  background: rgba(255,255,255,0.2);
  margin: 22px auto 20px;
}

.fc-ro {
  font-family: var(--font-mo);
  font-size: 11px;
  font-weight: 300;
  color: rgba(255,255,255,0.25);
  line-height: 2;
  text-align: center;
  margin-bottom: 14px;
}

.fc-zh {
  font-size: 17px;
  font-weight: 300;
  color: rgba(255,255,255,0.55);
  text-align: center;
  line-height: 1.5;
}

/* ── Install bar ── */
.ibar {
  background: #2a2a2a;
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
}
.ibar span { flex: 1; font-size: 12px; color: rgba(255,255,255,0.65); line-height: 1.4; }
.ibar-btn {
  padding: 6px 14px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.2);
  background: none;
  color: rgba(255,255,255,0.75);
  font-size: 11.5px;
  cursor: pointer;
  white-space: nowrap;
}
.ibar-x {
  background: none; border: none;
  font-size: 16px; color: rgba(255,255,255,0.25);
  cursor: pointer; padding: 2px 4px; line-height: 1;
}
</style>
</head>
<body>

<div class="header">
  <div class="h-eyebrow">Travel Japanese</div>
  <div class="h-title">旅遊日語</div>
  <div class="h-sub">フレーズ帳 — 常用會話</div>
</div>

<div class="ibar" id="ibar">
  <span>加入主畫面，離線也能使用</span>
  <button class="ibar-btn" id="ibtn">安裝</button>
  <button class="ibar-x"   id="iclose">✕</button>
</div>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>

<div id="app"></div>

<!-- Flashcard sheet -->
<div class="overlay" id="overlay" onclick="chkOverlay(event)">
  <div class="fc" id="fc">
    <div class="fc-handle"></div>
    <button class="fc-close" onclick="closeFC()">✕</button>
    <div class="fc-cat" id="fc-cat"></div>
    <div class="fc-jp"  id="fc-jp"></div>
    <div class="fc-bar"></div>
    <div class="fc-ro"  id="fc-ro"></div>
    <div class="fc-zh"  id="fc-zh"></div>
  </div>
</div>

  {id:47, jp:"ICカードで乗れますか？",          ro:"ai.shi.kā.do de no.re.ma.su ka?",                     zh:"可以用IC卡搭乘嗎？",     en:"Can I use an IC card to ride?",                    cat:"購票"},
  {id:48, jp:"乗り換えはありますか？",          ro:"no.ri.ka.e wa a.ri.ma.su ka?",                        zh:"需要換乘嗎？",           en:"Do I need to transfer?",                           cat:"購票"},
  {id:49, jp:"何番線ですか？",                  ro:"nan.ban.sen de.su ka?",                               zh:"是幾號月台？",           en:"Which platform is it?",                            cat:"購票"},
  {id:50, jp:"領収書をください。",              ro:"ryō.shū.sho o ku.da.sa.i",                            zh:"請給我收據。",           en:"May I have a receipt, please?",                    cat:"購票"}
];

const CATS=['全部','餐廳','飯店','購物','問路','購票'];
const CATJP={'全部':'すべて','餐廳':'食事','飯店':'ホテル','購物':'買物','問路':'道案内','購票':'切符'};
let cur='全部', spBtn=null;

function doSpeak(txt, btn){
  if(!window.speechSynthesis) return;

  /* iOS Safari: cancel 必須在同一個 user-gesture stack 內，
     speak() 也必須同步呼叫，不可放進 setTimeout / Promise */
  window.speechSynthesis.cancel();

  if(spBtn && spBtn !== btn) spBtn.classList.remove('on');

  const u = new SpeechSynthesisUtterance(txt);

  /* 直接設 lang，不設 voice —— iOS getVoices() 初次為空，
     強制指定 voice 反而造成無聲；只設 lang='ja-JP' 最穩定 */
  u.lang  = 'ja-JP';
  u.rate  = 0.82;
  u.pitch = 1.0;

  spBtn = btn;
  btn.classList.add('on');
  u.onend  = () => btn.classList.remove('on');
  u.onerror = () => btn.classList.remove('on');

  /* iOS 偶發 bug：cancel 後立刻 speak 有時靜音，
     用 requestAnimationFrame 讓瀏覽器清空佇列，
     但仍在同一 user-gesture frame 內所以不會被 block */
  window.requestAnimationFrame(() => {
    window.speechSynthesis.speak(u);
  });
}

function openFC(id){
  const p=DATA.find(x=>x.id===id); if(!p)return;
  const full=p.sub?p.jp+'\n'+p.sub:p.jp;
  document.getElementById('fc-cat').textContent=p.cat;
  const jEl=document.getElementById('fc-jp');
  jEl.innerHTML=full.replace(/\n/g,'<br>');
  jEl.className='fc-jp'+(full.replace(/\n/g,'').length>14?' fc-long':'');
  document.getElementById('fc-ro').innerHTML=p.ro.replace(/\n/g,'<br>');
  document.getElementById('fc-zh').textContent=p.zh;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeFC(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
function chkOverlay(e){if(e.target===document.getElementById('overlay'))closeFC();}

function card(p){
  const lng = p.jp.length > 15;
  const jpTxt = p.jp.replace(/"/g, '&quot;');
  return `<div class="pc">
  <div class="pc-body">
    <div class="pc-jp${lng?' lg':''}">${p.jp}${p.sub?`<span class="pc-jp-sub">${p.sub}</span>`:''}</div>
    <div class="pc-ro">${p.ro.replace(/\n/g,'<br>')}</div>
    <div class="pc-zh">${p.zh}</div>
    <div class="pc-en">${p.en}</div>
  </div>
  <div class="pc-bar">
    <button class="pc-speak" data-jp="${jpTxt}" onclick="doSpeak(this.dataset.jp,this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <span class="sp-dot"></span>
      發音
    </button>
    <button class="pc-card" onclick="openFC(${p.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      字卡
    </button>
  </div>
</div>`;
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=CATS.map(c=>
    `<button class="tab${c===cur?' active':''}" onclick="setTab('${c}')">${c}</button>`
  ).join('');
}

function setTab(c){
  cur=c;
  speechSynthesis&&speechSynthesis.cancel();
  if(spBtn){spBtn.classList.remove('on');spBtn=null;}
  renderTabs();renderList();
}

function renderList(){
  const app=document.getElementById('app');
  if(cur!=='全部'){
    app.innerHTML=`<div class="list">${DATA.filter(p=>p.cat===cur).map(card).join('')}</div>`;
    return;
  }
  app.innerHTML=CATS.filter(c=>c!=='全部').map(cat=>`
    <div class="list">
      <div class="sec-head">
        <span class="sec-label">${cat} · ${CATJP[cat]}</span>
        <div class="sec-line"></div>
      </div>
      ${DATA.filter(p=>p.cat===cat).map(card).join('')}
    </div>`).join('');
}

let deferred=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferred=e;
  document.getElementById('ibar').style.display='flex';
});
document.getElementById('ibtn').onclick=async()=>{
  if(!deferred)return;
  deferred.prompt();await deferred.userChoice;
  deferred=null;document.getElementById('ibar').style.display='none';
};
document.getElementById('iclose').onclick=()=>document.getElementById('ibar').style.display='none';
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

renderTabs();renderList();
</script>
</body>
